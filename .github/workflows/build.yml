name: Build APK

on:
  push:
    branches: [ main ]

jobs:
  build:
    runs-on: ubuntu-22.04

    steps:
    - uses: actions/checkout@v4

    - name: Install system dependencies
      run: |
        sudo apt-get update
        sudo apt-get install -y \
          python3 python3-pip build-essential git \
          autoconf libtool pkg-config \
          zip unzip openjdk-17-jdk \
          libffi-dev libssl-dev ccache

    - name: Install Python packages
      run: |
        pip3 install --upgrade pip
        pip3 install buildozer==1.5.0 cython==0.29.33

    - name: Install Android SDK manually
      run: |
        SDK=$HOME/.buildozer/android/platform/android-sdk
        mkdir -p $SDK/cmdline-tools
        wget -q https://dl.google.com/android/repository/commandlinetools-linux-9477386_latest.zip -O cmdtools.zip
        unzip -q cmdtools.zip -d $SDK/cmdline-tools
        mv $SDK/cmdline-tools/cmdline-tools $SDK/cmdline-tools/latest
        export PATH=$SDK/cmdline-tools/latest/bin:$PATH
        yes | sdkmanager --sdk_root=$SDK --licenses > /dev/null 2>&1
        sdkmanager --sdk_root=$SDK "platform-tools" "platforms;android-33" "build-tools;33.0.2"
        mkdir -p $SDK/tools/bin
        ln -sf $SDK/cmdline-tools/latest/bin/sdkmanager $SDK/tools/bin/sdkmanager

    - name: Build APK
      env:
        JAVA_HOME: /usr/lib/jvm/java-17-openjdk-amd64
        ANDROID_SDK_ROOT: /home/runner/.buildozer/android/platform/android-sdk
      run: |
        yes | buildozer -v android debug 2>&1 | tee build.log
        ls -la bin/ || echo "No APK found"

    - name: Upload APK
      uses: actions/upload-artifact@v4
      with:
        name: Currency-Converter-APK
        path: bin/*.apk
        if-no-files-found: warn

    - name: Upload build log
      if: always()
      uses: actions/upload-artifact@v4
      with:
        name: build-log
        path: build.log
